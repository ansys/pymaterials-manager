name: GitHub CI
on:
  merge_group:
  pull_request:
  push:
    tags:
      - "*"
    branches:
      - main

env:
  MAIN_PYTHON_VERSION: '3.14'
  MAPDL_DOCKER_PACKAGE: 'ghcr.io/ansys/mapdl'
  MAPDL_DOCKER_VERSION: 'v24.2.3-ubuntu-cicd'
  DPF_GIL_DOCKER_PACKAGE: 'ghcr.io/ansys-internal/gil-dpf-server'
  DPF_GIL_DOCKER_VERSION: 'v2027.1.pre0'
  DOCUMENTATION_CNAME: "manager.materials.docs.pyansys.com"
  PACKAGE_NAME: "ansys-materials-manager"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  code-style:
    name: "Running code style checks"
    runs-on: ubuntu-latest
    steps:
      - name: "Run PyAnsys code style checks"
        uses: ansys/actions/code-style@a5b0351dc277d68c2dc1beca2d2674c7dfa4fc55  # v10.3.3
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          skip-install: false

  doc-style:
    name: "Running documentation style checks"
    runs-on: ubuntu-latest
    steps:
      - name: "Running documentation style checks"
        uses: ansys/actions/doc-style@a5b0351dc277d68c2dc1beca2d2674c7dfa4fc55  # v10.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  smoke-tests:
    name: Build and Smoke tests
    runs-on: ${{ matrix.os }}
    needs: code-style
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - name: Build wheelhouse and perform smoke test
        uses: ansys/actions/build-wheelhouse@a5b0351dc277d68c2dc1beca2d2674c7dfa4fc55  # v10.3.3
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          operating-system: ${{ matrix.os }}
          python-version: ${{ matrix.python-version }}
          whitelist-license-check: astroid

  tests:
    name: "Tests Python ${{ matrix.python-version }}, ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: smoke-tests
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
      fail-fast: false

    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test with pytest and coverage
        run: uv run --frozen pytest ./tests

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        if: ${{ matrix.python-version == env.MAIN_PYTHON_VERSION && matrix.os == 'ubuntu-latest' && github.actor != 'dependabot[bot]' }}
        with:
          files: .cov/xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration tests with MAPDL and DPF GIL
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: "Login in Github container registry"
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          password: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}

      - name: "Start MAPDL"
        run: |
          MAPDL_IMAGE="${{ env.MAPDL_DOCKER_PACKAGE }}:${{ env.MAPDL_DOCKER_VERSION }}"
          docker pull $MAPDL_IMAGE
          docker run \
            --name mapdl \
            --restart unless-stopped \
            -e ANSYSLMD_LICENSE_FILE=1055@${{ secrets.LICENSE_SERVER }} \
            -e ANSYS_LOCK="OFF" \
            -p 50052:50052 \
            -p 50055:50055 \
            --entrypoint /bin/bash \
            $MAPDL_IMAGE \
            ansysgrpc -smp -np 2 -transport insecure -allowremote true | tee log.txt &
          # Wait for MAPDL to start by checking the log file every second for up to 60 seconds
          for i in {1..60}; do
            if tail -n 10 log.txt | grep -q 'Server listening on'; then
              echo "MAPDL server started."
              break
            fi
            sleep 1
          done
          if ! tail -n 10 log.txt | grep -q 'Server listening on'; then
            echo "MAPDL server did not start within 60 seconds. Log output:" >&2
            cat log.txt >&2
            exit 1
          fi

      - name: Test with pytest (MAPDL integration tests only)
        run: uv run --frozen pytest ./tests -m mapdl_integration -o addopts="--cov=ansys.materials --cov-report=term --cov-report=xml:.cov/xml --cov-report=html:.cov/html"
        env:
          PYMAPDL_GRPC_TRANSPORT: insecure

      - name: "Pull and Run dpf-gil plugin"
        run: |
          DPF_GIL_IMAGE="${{ env.DPF_GIL_DOCKER_PACKAGE }}:${{ env.DPF_GIL_DOCKER_VERSION }}"
          docker pull $DPF_GIL_IMAGE
          docker run --name dpf_gil \
            -e "ANSYS_DPF_ACCEPT_LA=Y" \
            -e "ANSYS_GRPC_CERTIFICATES=insecure" \
            -e ANSYSLMD_LICENSE_FILE=1055@${{ secrets.LICENSE_SERVER }} \
            -p 50054:50054 -e DOCKER_SERVER_PORT=50054 \
            --expose=50054 $DPF_GIL_IMAGE | tee log.txt & \
          # Wait for DPF GIL server to start by checking the log file every second for up to 60 seconds
          for i in {1..60}; do
            if nc -z localhost 50054 2>/dev/null; then
              echo "DPF GIL server started and listening on port 50054."
              break
            fi
            sleep 1
          done
          if ! nc -z localhost 50054 2>/dev/null; then
            echo "DPF GIL server did not start within 60 seconds. Log output:" >&2
            cat log.txt >&2
            exit 1
          fi
            
      - name: Test with pytest (DPF GIL integration tests only)
        run: uv run --frozen pytest ./tests -m dpf_gil_integration -o addopts="--cov=ansys.materials --cov-report=term --cov-report=xml:.cov/xml --cov-report=html:.cov/html"

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        if: ${{ github.actor != 'dependabot[bot]' }}
        with:
          files: .cov/xml
          flags: mapdl-integration
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  doc-build:
    name: "Building library documentation"
    runs-on: ubuntu-latest
    needs: doc-style
    steps:
      - name: "Run Ansys documentation building action"
        uses: ansys/actions/doc-build@a5b0351dc277d68c2dc1beca2d2674c7dfa4fc55  # v10.3.3
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          optional-dependencies-name: ""
          group-dependencies-name: "doc"
          sphinxopts: -j auto --keep-going

  build:
    name: Build library
    runs-on: ubuntu-latest
    needs: [ doc-build, tests, integration-tests ]
    steps:
      - uses: ansys/actions/build-library@a5b0351dc277d68c2dc1beca2d2674c7dfa4fc55  # v10.3.3
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  upload_dev_docs:
    name: Upload dev documentation
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy the latest documentation
        uses: ansys/actions/doc-deploy-dev@a5b0351dc277d68c2dc1beca2d2674c7dfa4fc55  # v10.3.3
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
          doc-artifact-name: "documentation-html"

  release:
    name: Release project
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
    - name: "Download the library artifacts from build-library step"
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ env.PACKAGE_NAME }}-artifacts
        path: ${{ env.PACKAGE_NAME }}-artifacts

    - name: "Upload artifacts to PyPI using trusted publisher"
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        repository-url: "https://upload.pypi.org/legacy/"
        print-hash: true
        packages-dir: ${{ env.PACKAGE_NAME }}-artifacts
        skip-existing: false

  upload_docs_release:
    name: "Upload release documentation"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Deploy the stable documentation
        uses: ansys/actions/doc-deploy-stable@a5b0351dc277d68c2dc1beca2d2674c7dfa4fc55  # v10.3.3
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
