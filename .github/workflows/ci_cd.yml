name: GitHub CI
on:
  merge_group:
  pull_request:
  push:
    tags:
      - "*"
    branches:
      - main

env:
  MAIN_PYTHON_VERSION: '3.14'
  MAPDL_DOCKER_PACKAGE: 'ghcr.io/ansys/mapdl'
  MAPDL_DOCKER_VERSION: 'v24.2.3-ubuntu-cicd'
  DOCUMENTATION_CNAME: "manager.materials.docs.pyansys.com"
  PACKAGE_NAME: "ansys-materials-manager"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  code-style:
    name: "Running code style checks"
    runs-on: ubuntu-latest
    steps:
      - name: "Run PyAnsys code style checks"
        uses: ansys/actions/code-style@d946b24b9a765f4169bcc94afdb27bd1a0533741  # v10.3.2
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          skip-install: false

  doc-style:
    name: "Running documentation style checks"
    runs-on: ubuntu-latest
    steps:
      - name: "Running documentation style checks"
        uses: ansys/actions/doc-style@d946b24b9a765f4169bcc94afdb27bd1a0533741  # v10.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  smoke-tests:
    name: Build and Smoke tests
    runs-on: ${{ matrix.os }}
    needs: code-style
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - name: Build wheelhouse and perform smoke test
        uses: ansys/actions/build-wheelhouse@d946b24b9a765f4169bcc94afdb27bd1a0533741  # v10.3.2
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          operating-system: ${{ matrix.os }}
          python-version: ${{ matrix.python-version }}
          whitelist-license-check: astroid

  tests:
    name: "Tests Python ${{ matrix.python-version }}, ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: smoke-tests
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
      fail-fast: false

    steps:
      - name: Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test with pytest and coverage
        run: uv run --frozen pytest ./tests

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        if: ${{ matrix.python-version == env.MAIN_PYTHON_VERSION && matrix.os == 'ubuntu-latest' && github.actor != 'dependabot[bot]' }}
        with:
          files: .cov/xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  mapdl-integration-tests:
    name: Integration tests with MAPDL
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: "Login in Github container registry"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          password: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}

      - name: "Launch first MAPDL instance using action"
        id: mapdl_0
        uses: ansys/pymapdl/.github/actions/launch-mapdl-docker@main
        with:
          mapdl-image: ${{ env.MAPDL_DOCKER_PACKAGE }}:${{ env.MAPDL_DOCKER_VERSION }}
          license-server: ${{ secrets.LICENSE_SERVER }}
          pymapdl-port: 50052

      - name: Test with pytest (MAPDL integration tests only)
        run: uv run --frozen pytest ./tests -m mapdl_integration -o addopts="--cov=ansys.materials --cov-report=term --cov-report=xml:.cov/xml --cov-report=html:.cov/html"
        env:
          PYMAPDL_GRPC_TRANSPORT: insecure

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        if: ${{ github.actor != 'dependabot[bot]' }}
        with:
          files: .cov/xml
          flags: mapdl-integration
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  doc-build:
    name: "Building library documentation"
    runs-on: ubuntu-latest
    needs: doc-style
    steps:
      - name: "Run Ansys documentation building action"
        uses: ansys/actions/doc-build@d946b24b9a765f4169bcc94afdb27bd1a0533741  # v10.3.2
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          optional-dependencies-name: ""
          group-dependencies-name: "doc"
          sphinxopts: -j auto --keep-going

  build:
    name: Build library
    runs-on: ubuntu-latest
    needs: [ doc-build, tests, mapdl-integration-tests ]
    steps:
      - uses: ansys/actions/build-library@d946b24b9a765f4169bcc94afdb27bd1a0533741  # v10.3.2
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  upload_dev_docs:
    name: Upload dev documentation
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy the latest documentation
        uses: ansys/actions/doc-deploy-dev@d946b24b9a765f4169bcc94afdb27bd1a0533741  # v10.3.2
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
          doc-artifact-name: "documentation-html"

  release:
    name: Release project
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
    - name: "Download the library artifacts from build-library step"
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ env.PACKAGE_NAME }}-artifacts
        path: ${{ env.PACKAGE_NAME }}-artifacts

    - name: "Upload artifacts to PyPI using trusted publisher"
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        repository-url: "https://upload.pypi.org/legacy/"
        print-hash: true
        packages-dir: ${{ env.PACKAGE_NAME }}-artifacts
        skip-existing: false

  upload_docs_release:
    name: "Upload release documentation"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Deploy the stable documentation
        uses: ansys/actions/doc-deploy-stable@d946b24b9a765f4169bcc94afdb27bd1a0533741  # v10.3.2
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
